services:
  # ──────────────── Backend (Flask API) ────────────────
  - type: web
    name: agro-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false  # You will enter this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ──────────────── Frontend (React Static Site) ────────────────
  - type: web
    name: agro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: agro-backend
          type: web
          property: hostport
